version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directories:
      - /app/src/DDRGpScoreViewer
      - /app/tests/DDRGpScoreViewer.Tests
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
