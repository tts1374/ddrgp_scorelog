name: Build master database

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 6"

permissions:
  contents: read

jobs:
  build-master-db:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: |
          python -X utf8 -m pip install --upgrade pip
          python -X utf8 -m pip install beautifulsoup4 lxml requests pytest

      - name: Run master parser fixture tests
        run: python -X utf8 -m pytest tests/test_master_builder.py

      - name: Build SQLite master database
        run: python -X utf8 -m master --output data/master/ddrgp-master.sqlite

      - name: Inspect generated database
        run: >
          python -X utf8 -m master.inspect data/master/ddrgp-master.sqlite
          --summary data/master/master-summary.json

      - name: Upload master database artifact
        uses: actions/upload-artifact@v7
        with:
          name: ddrgp-master-${{ github.run_number }}
          path: |
            data/master/ddrgp-master.sqlite
            data/master/master-summary.json
          if-no-files-found: error
          retention-days: 30
