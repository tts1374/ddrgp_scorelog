<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1120" viewBox="0 0 1440 1120">
  <style>
    text { font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif; fill: #172033; }
    .title { font-size: 28px; font-weight: 700; }
    .section { font-size: 19px; font-weight: 700; fill: #1453a3; }
    .label { font-size: 15px; font-weight: 700; }
    .body { font-size: 14px; }
    .small { font-size: 12px; }
    .muted { fill: #667085; }
    .blue { fill: #0b66c3; }
    .green { fill: #15803d; }
    .red { fill: #c62828; }
    .orange { fill: #b56a00; }
    .panel { fill: #ffffff; stroke: #b9c4d3; stroke-width: 1.5; }
    .soft { fill: #f7f9fc; stroke: #c7d0dc; stroke-width: 1.2; }
    .bluebox { fill: #f5f9ff; stroke: #3b82f6; stroke-width: 1.5; }
    .errorbox { fill: #fff4f4; stroke: #ef4444; stroke-width: 1.5; }
    .header { fill: #f8fafc; stroke: #c7d0dc; stroke-width: 1; }
    .row { fill: #ffffff; stroke: #d5dce6; stroke-width: 1; }
    .btn { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.2; rx: 6; }
    .btnblue { fill: #0b66c3; stroke: #0b66c3; stroke-width: 1.2; rx: 6; }
    .disabled { fill: #f2f4f7; stroke: #d0d5dd; stroke-width: 1.2; rx: 6; }
  </style>

  <rect width="1440" height="1120" fill="#ffffff"/>
  <rect x="24" y="24" width="14" height="14" fill="#102a56"/>
  <text x="50" y="39" class="title">手動レビュー画面 全体構成案（#55 / #56）</text>

  <rect x="24" y="58" width="900" height="170" rx="8" class="bluebox"/>
  <text x="44" y="86" class="section">概要</text>
  <text x="50" y="116" class="body">・インポートした内容はレビュー下書きとして画面に反映するだけで、曲情報には反映しない。</text>
  <text x="50" y="143" class="body">・曲情報を更新する操作は「一括反映」のみとする。</text>
  <text x="50" y="170" class="body">・一括反映では、状態が「確定」または「却下」の行を処理する。</text>
  <text x="50" y="197" class="body">・反映完了後、対象行は未レビュータブから除外し、レビュー済みタブへ表示する。</text>
  <text x="50" y="224" class="body">・「未レビュー」と「保留」は一括反映の対象外とする。</text>

  <rect x="24" y="246" width="900" height="630" rx="8" class="panel"/>
  <rect x="24" y="246" width="900" height="66" rx="8" class="header"/>
  <text x="58" y="287" class="label blue">未レビュー</text>
  <line x1="44" y1="305" x2="152" y2="305" stroke="#0b66c3" stroke-width="4"/>
  <text x="190" y="287" class="label">レビュー済み</text>
  <text x="314" y="287" class="small muted">後続Issue</text>

  <rect x="548" y="261" width="110" height="38" class="btn"/>
  <text x="578" y="286" class="label">エクスポート</text>
  <rect x="670" y="261" width="98" height="38" class="btn"/>
  <text x="695" y="286" class="label">インポート</text>
  <rect x="780" y="261" width="124" height="38" class="btnblue"/>
  <text x="813" y="286" class="label" fill="#ffffff">一括反映</text>

  <rect x="42" y="330" width="182" height="48" rx="7" fill="#f4f8ff" stroke="#3b82f6"/>
  <text x="68" y="360" class="label blue">未レビュー　120</text>
  <rect x="238" y="330" width="182" height="48" rx="7" fill="#f2fbf5" stroke="#22a06b"/>
  <text x="267" y="360" class="label green">確定予定　0</text>
  <rect x="434" y="330" width="182" height="48" rx="7" fill="#fff5f5" stroke="#ef4444"/>
  <text x="462" y="360" class="label red">却下予定　0</text>
  <rect x="630" y="330" width="182" height="48" rx="7" fill="#fff9ee" stroke="#f59e0b"/>
  <text x="671" y="360" class="label orange">保留　0</text>

  <rect x="38" y="396" width="872" height="50" class="header"/>
  <line x1="185" y1="396" x2="185" y2="786" stroke="#d5dce6"/>
  <line x1="350" y1="396" x2="350" y2="786" stroke="#d5dce6"/>
  <line x1="470" y1="396" x2="470" y2="786" stroke="#d5dce6"/>
  <line x1="665" y1="396" x2="665" y2="786" stroke="#d5dce6"/>
  <line x1="790" y1="396" x2="790" y2="786" stroke="#d5dce6"/>
  <text x="66" y="417" class="label">タイトルROI</text>
