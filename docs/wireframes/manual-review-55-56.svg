  <rect x="24" y="896" width="900" height="190" rx="8" fill="#fbfdff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="44" y="925" class="section">#56で実装する範囲</text>
  <rect x="42" y="942" width="425" height="126" rx="6" class="bluebox"/>
  <text x="58" y="968" class="label blue">このIssueで実装</text>
  <text x="60" y="994" class="body">・未レビュータブ</text>
  <text x="60" y="1018" class="body">・タイトルROI（内部切り出し画像）の表示</text>
  <text x="60" y="1042" class="body">・アーティストROI（内部切り出し画像）の表示</text>
  <text x="255" y="994" class="body">・状態の編集</text>
  <text x="255" y="1018" class="body">・確定曲の検索・選択</text>
  <text x="255" y="1042" class="body">・メモ編集、下書き保存、入力エラー表示</text>

  <rect x="482" y="942" width="424" height="126" rx="6" class="soft"/>
  <text x="498" y="968" class="label blue">後続Issueで実装</text>
  <text x="500" y="994" class="body">・レビュー済みタブ</text>
  <text x="500" y="1018" class="body">・エクスポート</text>
  <text x="500" y="1042" class="body">・インポート / 一括反映</text>

  <rect x="952" y="896" width="440" height="190" rx="8" class="panel"/>
  <text x="972" y="927" class="section">注記</text>
  <text x="972" y="962" class="body">本図は、画面上の情報配置と操作の流れを示す</text>
  <text x="972" y="986" class="body">ワイヤーフレームです。</text>
  <text x="972" y="1018" class="body">見た目の完全な再現は求めません。</text>
  <text x="972" y="1050" class="body">動作およびデータ処理はIssue本文を正とします。</text>
