  <rect x="484" y="718" width="165" height="38" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="742" class="body">未選択　　　　　　⌄</text>
  <text x="810" y="732" class="label red">△ 入力エラー</text>
  <text x="810" y="754" class="small">確定曲を選択してください</text>

  <rect x="38" y="804" width="872" height="56" rx="6" class="errorbox"/>
  <text x="58" y="828" class="label red">△ 入力内容に1件のエラーがあります</text>
  <text x="72" y="850" class="body">対象ID 123：状態が「確定」の場合、確定曲を選択してください。</text>

  <text x="970" y="274" class="section">確定曲の選択（候補内検索）</text>
  <rect x="970" y="294" width="422" height="485" rx="8" class="panel"/>
  <rect x="988" y="314" width="170" height="38" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
