  <rect x="38" y="614" width="872" height="84" class="row"/>
  <rect x="58" y="630" width="106" height="52" fill="#f2f4f7" stroke="#c7d0dc"/>
  <text x="97" y="662" class="body muted">画像</text>
  <rect x="205" y="630" width="124" height="52" fill="#f2f4f7" stroke="#c7d0dc"/>
  <text x="249" y="662" class="body muted">画像</text>
  <rect x="365" y="634" width="92" height="38" rx="5" fill="#ffffff" stroke="#f59e0b"/>
  <text x="388" y="658" class="body">保留　⌄</text>
  <rect x="484" y="634" width="165" height="38" rx="5" fill="#ffffff" stroke="#98a2b3"/>
