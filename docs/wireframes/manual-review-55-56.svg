  <text x="821" y="437" class="label">入力エラー</text>

  <rect x="38" y="446" width="872" height="84" class="row"/>
  <rect x="58" y="462" width="106" height="52" fill="#f2f4f7" stroke="#c7d0dc"/>
  <text x="97" y="494" class="body muted">画像</text>
  <rect x="205" y="462" width="124" height="52" fill="#f2f4f7" stroke="#c7d0dc"/>
